services:
  - type: web
    name: idfm-mcp
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: python -m idfm_mcp.server
    healthCheckPath: /healthz
    envVars:
      # Optionnel : clé de repli côté serveur. En multi-utilisateurs, chaque
      # client envoie SA clé via l'en-tête 'X-PRIM-Api-Key' — laissez ceci vide.
      - key: PRIM_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.12"
